name: Findly
options:
  bundleIdPrefix: com.findly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_PREVIEWS: YES

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

targets:
  Findly:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Findly
        excludes:
          - Resources/Assets.xcassets
    resources:
      - Findly/Resources/Assets.xcassets
    info:
      path: Findly/Resources/Info.plist
      properties:
        CFBundleDisplayName: Findly
        CFBundleIdentifier: com.findly.app
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.REPLACE_WITH_REVERSED_CLIENT_ID
        BGTaskSchedulerPermittedIdentifiers:
          - com.findly.app.sync
        NSPhotoLibraryUsageDescription: "Findly needs access to your photo library to add images and videos to your vault."
        NSCameraUsageDescription: "Findly needs camera access to capture photos and videos for your vault."
        NSMicrophoneUsageDescription: "Findly needs microphone access to record audio notes."
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: false
    entitlements:
      path: Findly/Resources/Findly.entitlements
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.findly.app
        INFOPLIST_FILE: Findly/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Findly/Resources/Findly.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES

  FindlyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FindlyTests
    dependencies:
      - target: Findly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.findly.appTests
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
